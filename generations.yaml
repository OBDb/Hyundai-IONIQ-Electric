generations:
  - name: "First Generation"
    start_year: 2016
    end_year: 2019
    description: "The Hyundai IONIQ Electric was the battery electric variant of the first-generation Ioniq lineup, offered alongside hybrid and plug-in hybrid variants on a single dedicated platform. Featuring aerodynamic styling with a closed grille, active air flaps, and a smooth underbody achieving a drag coefficient of just 0.24. Equipped with a 28 kWh lithium-ion polymer battery providing an EPA-rated range of approximately 124 miles. The electric motor produced 120 HP and 295 Nm of torque, with a combined EPA fuel economy rating of 136 MPGe. The interior featured a driver-focused cockpit with a digital instrument cluster, touchscreen infotainment system, and distinctive copper-colored accents to differentiate it from hybrid variants. Sold in select markets including California initially, then expanded to other states and countries like Canada, Norway, Netherlands, and Switzerland."
  - name: "First Generation (2020 Facelift)"
    start_year: 2019
    end_year: 2022
    description: "The Ioniq Electric received a significant refresh for the 2020 model year, featuring a new interior design, larger battery pack, and increased performance. The lithium-ion polymer battery was upgraded from 28 kWh to 38.3 kWh, extending EPA-rated range to approximately 170 miles (311 km WLTP). Power output increased from 120 HP to 134 HP while maintaining the same 295 Nm of torque. The onboard AC charger was upgraded from 6.6 kW to 7.2 kW for faster home charging. The refresh also included updated styling cues and enhanced technology features. Production ended in July 2022 as Hyundai transitioned to its dedicated E-GMP platform for the new Ioniq sub-brand (Ioniq 5, 6, 9)."